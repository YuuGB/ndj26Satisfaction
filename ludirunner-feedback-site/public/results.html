<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats - Nuit du Jeu 2026</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Résultats des Retours</h1>
        <a href="index.html" class="back-link">← Retour au formulaire</a>
        <button id="clear-results" class="clear-btn">Effacer les résultats</button>
    </header>
    <main>
        <section id="results">
            <div class="chart-row">
                <div class="chart-card">
                    <h2>Appréciation globale</h2>
                    <canvas id="chart-overall"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Variété des jeux</h2>
                    <canvas id="chart-variety"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Organisation</h2>
                    <canvas id="chart-org"></canvas>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h2>Origine</h2>
                    <canvas id="chart-source"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Lieu</h2>
                    <canvas id="chart-location"></canvas>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h2>Zones préférées</h2>
                    <canvas id="chart-zones"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Événements</h2>
                    <canvas id="chart-events"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Suggestions</h2>
                    <canvas id="chart-suggestions"></canvas>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h2>Accueil / bénévoles</h2>
                    <canvas id="chart-helpers"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Horaires</h2>
                    <canvas id="chart-hours"></canvas>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h2>Restauration</h2>
                    <canvas id="chart-food"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Meilleures expériences</h2>
                    <canvas id="chart-best"></canvas>
                </div>
            </div>

            <div id="message" class="empty-message"></div>
        </section>
    </main>

    <script>
        const STORAGE_KEY = 'ludirunnerFeedback';
        const ACCESS_PASSWORD = 'ludirunner2026';
        const DELETE_PASSWORD = '2020';
        const MAX_ITEMS = 10;
        const chartInstances = new Map();

        const safeLoadFeedbacks = () => {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        };

        const clearFeedbacks = () => localStorage.removeItem(STORAGE_KEY);

        const normalizeText = (value) =>
            String(value ?? '').trim().replace(/\s+/g, ' ');

        const getTopCounts = (values, maxItems = MAX_ITEMS) => {
            const map = new Map();
            values.forEach((v) => {
                const key = normalizeText(v);
                if (!key) return;
                map.set(key, (map.get(key) || 0) + 1);
            });
            return [...map.entries()].sort((a, b) => b[1] - a[1]).slice(0, maxItems);
        };

        const getScoreCounts = (feedbacks, field) => {
            const result = [0, 0, 0, 0, 0];
            feedbacks.forEach((f) => {
                const n = Number(f[field]);
                if (n >= 1 && n <= 5) result[n - 1]++;
            });
            return result;
        };

        const buildOrUpdateBarChart = (canvasId, labels, data) => {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            const existing = chartInstances.get(canvasId);
            if (existing) existing.destroy();

            const chart = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: 'rgba(0, 212, 255, 0.6)',
                        borderColor: '#00d4ff',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
                }
            });

            chartInstances.set(canvasId, chart);
        };

        const render = () => {
            const feedbacks = safeLoadFeedbacks();
            const message = document.getElementById('message');

            if (!feedbacks.length) {
                message.textContent = 'Aucun retour soumis pour le moment.';
                chartInstances.forEach((c) => c.destroy());
                chartInstances.clear();
                return;
            }

            message.textContent = '';

            // Notes /5
            buildOrUpdateBarChart('chart-overall', ['1', '2', '3', '4', '5'], getScoreCounts(feedbacks, 'overall'));
            buildOrUpdateBarChart('chart-variety', ['1', '2', '3', '4', '5'], getScoreCounts(feedbacks, 'variety'));
            buildOrUpdateBarChart('chart-org', ['1', '2', '3', '4', '5'], getScoreCounts(feedbacks, 'org'));

            // Textes (top fréquences)
            const renderTop = (id, field) => {
                const top = getTopCounts(feedbacks.map((f) => f[field]));
                const labels = top.map(([k]) => k);
                const values = top.map(([, v]) => v);
                buildOrUpdateBarChart(id, labels.length ? labels : ['Aucune donnée'], values.length ? values : [0]);
            };

            renderTop('chart-source', 'source');
            renderTop('chart-location', 'location');
            renderTop('chart-zones', 'zones');
            renderTop('chart-events', 'events');
            renderTop('chart-suggestions', 'suggestions');
            renderTop('chart-helpers', 'helpers');
            renderTop('chart-hours', 'hours');
            renderTop('chart-food', 'food');
            renderTop('chart-best', 'best');
        };

        document.addEventListener('DOMContentLoaded', () => {
            const pass = prompt('Mot de passe :');
            if (pass !== ACCESS_PASSWORD) {
                alert('Accès refusé');
                window.location.href = 'index.html';
                return;
            }

            render();

            const clearBtn = document.getElementById('clear-results');
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    const confirmPass = prompt('Mot de passe pour effacer :');
                    if (confirmPass !== DELETE_PASSWORD) {
                        alert('Mot de passe incorrect.');
                        return;
                    }

                    clearFeedbacks();
                    render();
                    alert('Résultats effacés.');
                });
            }
        });
    </script>
</body>
</html>
